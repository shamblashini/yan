services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       yan
      POSTGRES_USER:     yan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yan -d yan"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── yan server ────────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://yan:${POSTGRES_PASSWORD}@db/yan
      AUTH_TOKEN:   ${AUTH_TOKEN}
      LISTEN_ADDR:  0.0.0.0:3000
      RUST_LOG:     ${RUST_LOG:-yan_server=info,tower_http=warn}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
